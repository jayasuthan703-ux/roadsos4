<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D0D0D">
<meta name="description" content="RoadSoS - Emergency Road Accident Response App">
<title>RoadSoS - Emergency Response</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #0a0a0a; font-family: 'DM Sans', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  #root { max-width: 420px; margin: 0 auto; position: relative; min-height: 100vh; background: #0D0D0D; }
  @keyframes pulseRing { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
  @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); } 20%, 40%, 60%, 80% { transform: translateX(4px); } }
  @keyframes pulse-bg { 0%, 100% { opacity: 0.12; } 50% { opacity: 0.2; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  ::-webkit-scrollbar { width: 0; height: 0; }
  textarea::placeholder { color: rgba(255,255,255,0.25); }
  .offline-banner { background: linear-gradient(90deg, #FF8C00, #FF4757); padding: 8px 16px; text-align: center; font-size: 12px; font-weight: 600; animation: slideIn 0.3s ease; }
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 20px; color: #fff; font-size: 13px; font-weight: 500; z-index: 2000; box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: transform 0.3s ease; display: flex; align-items: center; gap: 8px; max-width: 90%; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: #2ED573; }
  .toast.error { border-color: #FF4757; }
  .toast.warning { border-color: #FF8C00; }
  .sos-countdown-circle { transform: rotate(-90deg); }
  .service-card { transition: all 0.2s ease; }
  .service-card:hover { background: rgba(255,255,255,0.07) !important; }
  .filter-btn { transition: all 0.2s ease; }
  .filter-btn:active { transform: scale(0.95); }
  .quick-dial-btn { transition: all 0.2s ease; }
  .quick-dial-btn:active { transform: scale(0.97); }
  .nav-btn { transition: all 0.2s ease; }
  .nav-btn:active { transform: scale(0.9); }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
  button:focus-visible, a:focus-visible { outline: 2px solid #FF4757; outline-offset: 2px; border-radius: 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const vibrate = (pattern) => { if (navigator.vibrate) navigator.vibrate(pattern); };

const showToast = (message, type = 'info') => {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span>`;
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
};

const calculateDistance = (lat1, lon1, lat2, lon2) => {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
};

const formatDistance = (km) => { if (km < 1) return `${(km * 1000).toFixed(0)} m`; return `${km.toFixed(1)} km`; };
const estimateTime = (km) => { const minutes = Math.ceil(km * 3); return `${minutes} min`; };

const UNIVERSAL_EMERGENCY = {
  ambulance: "108", police: "100", fire: "101", women_helpline: "181", child_helpline: "1098", highway: "1033"
};

const QUICK_DIALS = [
  { label: "Ambulance", number: "108", icon: "🚑", color: "#FF6B35", desc: "Medical emergency" },
  { label: "Police", number: "100", icon: "🚔", color: "#1E90FF", desc: "Law enforcement" },
  { label: "Fire", number: "101", icon: "🔥", color: "#FF4500", desc: "Fire & rescue" },
  { label: "Highway", number: "1033", icon: "🛣️", color: "#2ED573", desc: "Road assistance" },
];

function OfflineDetector() {
  const [isOffline, setIsOffline] = useState(!navigator.onLine);
  useEffect(() => {
    const onOnline = () => { setIsOffline(false); showToast('Back online', 'success'); };
    const onOffline = () => { setIsOffline(true); showToast('You are offline. Emergency numbers still work.', 'warning'); };
    window.addEventListener('online', onOnline);
    window.addEventListener('offline', onOffline);
    return () => { window.removeEventListener('online', onOnline); window.removeEventListener('offline', onOffline); };
  }, []);
  if (!isOffline) return null;
  return <div className="offline-banner" role="alert" aria-live="polite">⚠️ You are offline. Emergency numbers and first aid guides are still available.</div>;
}

function useLocation() {
  const [location, setLocation] = useState({ status: 'detecting', text: 'Detecting location...', coords: null, error: null });
  useEffect(() => {
    if (!navigator.geolocation) { setLocation({ status: 'unsupported', text: 'Location not supported', coords: null, error: 'Geolocation API not available' }); return; }
    const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 };
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude, accuracy } = pos.coords;
        setLocation({ status: 'active', text: `${latitude.toFixed(4)}, ${longitude.toFixed(4)} · GPS Active`, coords: { lat: latitude, lon: longitude, accuracy }, error: null });
      },
      (err) => {
        let msg = 'Location unavailable';
        if (err.code === 1) msg = 'Location permission denied';
        else if (err.code === 2) msg = 'Location signal weak';
        else if (err.code === 3) msg = 'Location timeout';
        setLocation({ status: 'error', text: msg, coords: null, error: msg });
      },
      options
    );
    const watchId = navigator.geolocation.watchPosition(
      (pos) => { const { latitude, longitude, accuracy } = pos.coords; setLocation({ status: 'active', text: `${latitude.toFixed(4)}, ${longitude.toFixed(4)} · GPS Active`, coords: { lat: latitude, lon: longitude, accuracy }, error: null }); },
      () => {},
      { enableHighAccuracy: true, maximumAge: 10000 }
    );
    return () => navigator.geolocation.clearWatch(watchId);
  }, []);
  return location;
}

function useNearbyServices(location) {
  const [services, setServices] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [usingFallback, setUsingFallback] = useState(false);

  const searchNearby = useCallback(async () => {
    if (!location.coords) {
      setServices([]);
      return;
    }

    setLoading(true);
    setError(null);
    setUsingFallback(false);

    const { lat, lon } = location.coords;
    const overpassQuery = `
      [out:json][timeout:25];
      (
        node["amenity"="hospital"](around:10000,${lat},${lon});
        way["amenity"="hospital"](around:10000,${lat},${lon});
        node["amenity"="clinic"](around:10000,${lat},${lon});
        way["amenity"="clinic"](around:10000,${lat},${lon});
        node["amenity"="police"](around:10000,${lat},${lon});
        way["amenity"="police"](around:10000,${lat},${lon});
        node["amenity"="fire_station"](around:10000,${lat},${lon});
        way["amenity"="fire_station"](around:10000,${lat},${lon});
      );
      out center tags 20;
    `;

    try {
      const response = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `data=${encodeURIComponent(overpassQuery)}`
      });
      
      if (!response.ok) throw new Error('Overpass API error');
      const data = await response.json();
      
      if (!data.elements || data.elements.length === 0) {
        throw new Error('No services found nearby');
      }

      const mapped = data.elements.map((el, idx) => {
        const tags = el.tags || {};
        const elLat = el.lat || el.center?.lat;
        const elLon = el.lon || el.center?.lon;
        const dist = calculateDistance(lat, lon, elLat, elLon);
        
        let type = "Hospital";
        let icon = "🏥";
        let color = "#FF4757";
        let defaultPhone = UNIVERSAL_EMERGENCY.ambulance;
        
        if (tags.amenity === 'police') {
          type = "Police"; icon = "🚔"; color = "#1E90FF"; defaultPhone = UNIVERSAL_EMERGENCY.police;
        } else if (tags.amenity === 'fire_station') {
          type = "Fire & Rescue"; icon = "🚒"; color = "#FF8C00"; defaultPhone = UNIVERSAL_EMERGENCY.fire;
        } else if (tags.amenity === 'clinic') {
          type = "Clinic"; icon = "🏥"; color = "#FF6B6B"; defaultPhone = UNIVERSAL_EMERGENCY.ambulance;
        }

        let phone = tags.phone || tags['contact:phone'] || tags['emergency:phone'] || defaultPhone;
        phone = phone.replace(/\s/g, '').replace(/^\+91/, '').replace(/^0/, '');

        return {
          id: `${el.type}-${el.id}-${idx}`,
          type,
          name: tags.name || tags['name:en'] || `${type} Station`,
          phone: phone || defaultPhone,
          address: tags['addr:street'] ? `${tags['addr:street']}, ${tags['addr:city'] || ''}` : `${formatDistance(dist)} away`,
          icon,
          color,
          lat: elLat,
          lon: elLon,
          available: true,
          distance: formatDistance(dist),
          time: estimateTime(dist),
          _sortDist: dist,
          isRealData: true
        };
      });

      const sorted = mapped.sort((a, b) => a._sortDist - b._sortDist).slice(0, 15);
      setServices(sorted);
    } catch (err) {
      console.error('Overpass error:', err);
      setError('Could not fetch nearby services. Showing universal emergency numbers.');
      setUsingFallback(true);
      setServices([
        { id: 'fb-1', type: "Hospital", name: "Nearby Hospital", phone: "108", address: "Call for nearest ambulance", icon: "🏥", color: "#FF4757", distance: "—", time: "—", _sortDist: 0, isFallback: true },
        { id: 'fb-2', type: "Police", name: "Police Control Room", phone: "100", address: "Call for nearest police station", icon: "🚔", color: "#1E90FF", distance: "—", time: "—", _sortDist: 1, isFallback: true },
        { id: 'fb-3', type: "Fire & Rescue", name: "Fire Station", phone: "101", address: "Call for nearest fire station", icon: "🚒", color: "#FF8C00", distance: "—", time: "—", _sortDist: 2, isFallback: true },
      ]);
    } finally {
      setLoading(false);
    }
  }, [location.coords]);

  useEffect(() => {
    searchNearby();
  }, [searchNearby]);

  return { services, loading, error, usingFallback, refetch: searchNearby };
}

function AISeverityChecker() {
  const [description, setDescription] = useState("");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [apiKey, setApiKey] = useState(localStorage.getItem('roadsos_api_key') || '');
  const [showKeyInput, setShowKeyInput] = useState(false);
  const severityColors = { CRITICAL: "#FF4757", SERIOUS: "#FF8C00", MINOR: "#2ED573" };

  const analyze = async () => {
    if (!description.trim()) return;
    if (!apiKey.trim()) { setShowKeyInput(true); setError("Please enter your Anthropic API key to use the AI feature."); return; }
    setLoading(true); setResult(null); setError(null);
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}`, "Anthropic-Version": "2023-06-01" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: `You are an emergency road accident severity analyzer. Based on the user's description, respond ONLY with a valid JSON object — no markdown, no preamble. Fields required: { "severity": "CRITICAL" | "SERIOUS" | "MINOR", "summary": "One sentence summary", "callFirst": "Which service to call first e.g. Ambulance 108", "actions": ["action 1", "action 2", "action 3"], "doNot": ["avoid 1", "avoid 2"] }`, messages: [{ role: "user", content: description }] }),
      });
      if (!response.ok) { if (response.status === 401) throw new Error("Invalid API key. Please check your Anthropic API key."); if (response.status === 429) throw new Error("Rate limit exceeded. Please try again later."); throw new Error(`API error: ${response.status}`); }
      const data = await response.json();
      const text = data.content?.map((c) => c.text || "").join("") || data.content?.[0]?.text || "";
      const clean = text.replace(/```json|```/g, "").trim();
      setResult(JSON.parse(clean));
      vibrate(50);
    } catch (err) { setError(err.message || "Could not analyze. Please check your connection and try again."); vibrate([100, 50, 100]); }
    finally { setLoading(false); }
  };

  const saveApiKey = () => { localStorage.setItem('roadsos_api_key', apiKey); setShowKeyInput(false); setError(null); showToast('API key saved', 'success'); };

  return (
    <div style={{ paddingTop: "20px" }}>
      <div style={{ background: "linear-gradient(135deg, rgba(255,71,87,0.15), rgba(255,140,0,0.1))", border: "1px solid rgba(255,71,87,0.25)", borderRadius: "16px", padding: "16px", marginBottom: "20px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "6px" }}>
          <span style={{ fontSize: "24px" }} role="img" aria-label="robot">🤖</span>
          <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: "20px", letterSpacing: "2px", color: "#FF8A8A" }}>AI SEVERITY CHECKER</span>
        </div>
        <p style={{ color: "rgba(255,255,255,0.5)", fontSize: "12px", lineHeight: "1.6", margin: 0 }}>Describe the accident or emergency. AI will assess severity and tell you exactly what to do.</p>
        {!apiKey && <button onClick={() => setShowKeyInput(true)} style={{ marginTop: '10px', background: 'rgba(255,71,87,0.2)', border: '1px solid rgba(255,71,87,0.4)', borderRadius: '8px', padding: '6px 12px', color: '#FF8A8A', fontSize: '12px', cursor: 'pointer', width: '100%' }}>⚙️ Configure API Key to Enable AI Analysis</button>}
      </div>

      {showKeyInput && (
        <div style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '14px', padding: '14px', marginBottom: '16px' }}>
          <label style={{ display: 'block', color: 'rgba(255,255,255,0.6)', fontSize: '12px', marginBottom: '6px', fontWeight: 600 }}>Anthropic API Key (stored locally)</label>
          <input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="sk-ant-api03-..." style={{ width: '100%', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.12)', borderRadius: '10px', padding: '10px 12px', color: '#fff', fontSize: '13px', marginBottom: '10px', outline: 'none', fontFamily: 'monospace' }} />
          <div style={{ display: 'flex', gap: '8px' }}>
            <button onClick={saveApiKey} style={{ flex: 1, padding: '8px', background: '#2ED573', border: 'none', borderRadius: '8px', color: '#fff', fontSize: '12px', fontWeight: 600, cursor: 'pointer' }}>Save Key</button>
            <button onClick={() => setShowKeyInput(false)} style={{ flex: 1, padding: '8px', background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '8px', color: 'rgba(255,255,255,0.5)', fontSize: '12px', cursor: 'pointer' }}>Cancel</button>
          </div>
        </div>
      )}

      <p style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: "13px", letterSpacing: "2px", color: "rgba(255,255,255,0.4)", marginBottom: "8px" }}>DESCRIBE WHAT HAPPENED</p>
      <textarea value={description} onChange={(e) => setDescription(e.target.value)} placeholder="e.g. Two vehicles collided at the intersection. One person is unconscious, another has a bleeding leg. The car is smoking..." rows={5} style={{ width: "100%", boxSizing: "border-box", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: "14px", padding: "14px", color: "#fff", fontSize: "14px", lineHeight: "1.6", resize: "none", outline: "none", fontFamily: "'DM Sans', sans-serif", marginBottom: "14px" }} onFocus={e => e.target.style.borderColor = "rgba(255,71,87,0.5)"} onBlur={e => e.target.style.borderColor = "rgba(255,255,255,0.12)"} aria-label="Describe the accident or emergency" />

      <button onClick={analyze} disabled={loading || !description.trim()} style={{ width: "100%", padding: "16px", background: loading || !description.trim() ? "rgba(255,255,255,0.08)" : "linear-gradient(135deg, #FF4757, #C0392B)", border: "none", borderRadius: "14px", color: loading || !description.trim() ? "rgba(255,255,255,0.3)" : "#fff", fontSize: "15px", fontWeight: "700", cursor: loading || !description.trim() ? "not-allowed" : "pointer", letterSpacing: "1px", marginBottom: "20px", boxShadow: loading || !description.trim() ? "none" : "0 8px 24px rgba(255,71,87,0.35)", transition: "all 0.3s ease", fontFamily: "'Bebas Neue', sans-serif" }} aria-label={loading ? "Analyzing" : "Analyze severity"}>{loading ? "🔍 ANALYZING..." : "⚡ ANALYZE SEVERITY"}</button>

      {loading && <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "12px", padding: "24px" }}><div style={{ width: "48px", height: "48px", borderRadius: "50%", border: "3px solid rgba(255,71,87,0.2)", borderTop: "3px solid #FF4757", animation: "spin 1s linear infinite" }} role="status" aria-label="Loading" /><p style={{ color: "rgba(255,255,255,0.4)", fontSize: "13px" }}>AI is assessing the situation...</p></div>}

      {error && <div style={{ background: "rgba(255,71,87,0.1)", border: "1px solid rgba(255,71,87,0.3)", borderRadius: "14px", padding: "14px", color: "#FF8A8A", fontSize: "13px", textAlign: "center" }} role="alert">⚠️ {error}</div>}

      {result && (
        <div style={{ animation: "slideIn 0.4s ease" }}>
          <div style={{ background: `${severityColors[result.severity]}22`, border: `2px solid ${severityColors[result.severity]}`, borderRadius: "16px", padding: "16px", marginBottom: "14px", textAlign: "center" }} role="alert">
            <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: "32px", letterSpacing: "4px", color: severityColors[result.severity], marginBottom: "4px" }}>
              {result.severity === "CRITICAL" ? "🚨" : result.severity === "SERIOUS" ? "⚠️" : "✅"} {result.severity}
            </div>
            <p style={{ color: "rgba(255,255,255,0.7)", fontSize: "13px", margin: 0 }}>{result.summary}</p>
          </div>
          <a href={`tel:${result.callFirst?.match(/\d+/)?.[0] || '108'}`} style={{ textDecoration: 'none', display: 'block' }}>
            <div style={{ background: "rgba(255,107,53,0.15)", border: "1px solid rgba(255,107,53,0.35)", borderRadius: "14px", padding: "14px", marginBottom: "14px", display: "flex", alignItems: "center", gap: "12px", cursor: 'pointer' }}>
              <span style={{ fontSize: "28px" }} role="img" aria-label="phone">📞</span>
              <div><div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: "11px", letterSpacing: "2px", color: "rgba(255,255,255,0.4)", marginBottom: "2px" }}>CALL FIRST</div><div style={{ color: "#FF6B35", fontWeight: "700", fontSize: "16px" }}>{result.callFirst}</div></div>
              <span style={{ marginLeft: 'auto', color: '#FF6B35', fontSize: '12px', fontWeight: 600 }}>TAP TO CALL →</span>
            </div>
          </a>
          <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "14px", padding: "14px", marginBottom: "14px" }}>
            <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: "13px", letterSpacing: "2px", color: "rgba(255,255,255,0.4)", marginBottom: "10px" }}>✅ DO THIS NOW</div>
            {result.actions?.map((action, i) => <div key={i} style={{ display: "flex", gap: "10px", marginBottom: "8px", color: "rgba(255,255,255,0.75)", fontSize: "13px", lineHeight: "1.5" }}><span style={{ background: "#2ED57322", color: "#2ED573", borderRadius: "50%", width: "22px", height: "22px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "10px", fontWeight: "700", flexShrink: 0 }}>{i + 1}</span>{action}</div>)}
          </div>
          <div style={{ background: "rgba(255,71,87,0.06)", border: "1px solid rgba(255,71,87,0.2)", borderRadius: "14px", padding: "14px", marginBottom: "20px" }}>
            <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: "13px", letterSpacing: "2px", color: "rgba(255,71,87,0.7)", marginBottom: "10px" }}>❌ DO NOT</div>
            {result.doNot?.map((item, i) => <div key={i} style={{ display: "flex", gap: "10px", marginBottom: "8px", color: "rgba(255,255,255,0.6)", fontSize: "13px", lineHeight: "1.5" }}><span style={{ color: "#FF4757", flexShrink: 0 }}>✗</span>{item}</div>)}
          </div>
          <button onClick={() => { setResult(null); setDescription(""); }} style={{ width: "100%", padding: "12px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "12px", color: "rgba(255,255,255,0.5)", fontSize: "13px", cursor: "pointer", marginBottom: "10px" }}>🔄 Analyze Another Situation</button>
        </div>
      )}
    </div>
  );
}

function PanicButton({ onActivate, location }) {
  const [pressing, setPressing] = useState(false);
  const [progress, setProgress] = useState(0);
  const [activated, setActivated] = useState(false);
  const [countdown, setCountdown] = useState(0);
  const [showCancel, setShowCancel] = useState(false);
  const intervalRef = useRef(null);
  const countdownRef = useRef(null);

  const startPress = useCallback(() => {
    if (activated) return;
    setPressing(true);
    vibrate(20);
    intervalRef.current = setInterval(() => {
      setProgress((p) => {
        if (p >= 100) {
          clearInterval(intervalRef.current);
          setActivated(true);
          setShowCancel(true);
          setCountdown(5);
          vibrate([100, 100, 100, 100, 100]);
          return 100;
        }
        if (p % 20 === 0) vibrate(30);
        return p + 2;
      });
    }, 60);
  }, [activated]);

  const stopPress = useCallback(() => {
    if (activated) return;
    setPressing(false);
    setProgress(0);
    clearInterval(intervalRef.current);
  }, [activated]);

  const sendEmergencyAlert = useCallback((loc) => {
    const message = `EMERGENCY ALERT from RoadSoS\nLocation: ${loc?.text || 'Unknown'}\nTime: ${new Date().toLocaleString()}\nThis person activated the panic button and may need immediate assistance.`;
    if (navigator.share) {
      navigator.share({ title: '🚨 EMERGENCY ALERT', text: message }).catch(() => {});
    }
    const emergencyContacts = JSON.parse(localStorage.getItem('roadsos_emergency_contacts') || '[]');
    if (emergencyContacts.length > 0 && loc?.coords) {
      const mapsUrl = `https://maps.google.com/?q=${loc.coords.lat},${loc.coords.lon}`;
      emergencyContacts.forEach(contact => {
        const smsBody = encodeURIComponent(`EMERGENCY! I need help. Location: ${mapsUrl}`);
        window.open(`sms:${contact.phone}?body=${smsBody}`, '_blank');
      });
    }
    showToast('Emergency alert sent!', 'success');
  }, []);

  useEffect(() => {
    if (showCancel && countdown > 0) {
      countdownRef.current = setInterval(() => {
        setCountdown(c => {
          if (c <= 1) {
            clearInterval(countdownRef.current);
            onActivate();
            sendEmergencyAlert(location);
            return 0;
          }
          vibrate(50);
          return c - 1;
        });
      }, 1000);
      return () => clearInterval(countdownRef.current);
    }
  }, [showCancel, countdown, onActivate, location, sendEmergencyAlert]);

  const cancelSOS = () => {
    clearInterval(countdownRef.current);
    setActivated(false);
    setPressing(false);
    setProgress(0);
    setShowCancel(false);
    setCountdown(0);
    showToast('SOS cancelled', 'warning');
  };

  const confirmSOS = () => {
    clearInterval(countdownRef.current);
    setCountdown(0);
    onActivate();
    sendEmergencyAlert(location);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "12px" }}>
      <div
        onMouseDown={startPress}
        onMouseUp={stopPress}
        onMouseLeave={stopPress}
        onTouchStart={(e) => { e.preventDefault(); startPress(); }}
        onTouchEnd={(e) => { e.preventDefault(); stopPress(); }}
        onClick={activated && !showCancel ? () => { setActivated(false); setProgress(0); } : undefined}
        role="button"
        aria-label={activated ? "Emergency activated. Tap to reset." : pressing ? "Hold to activate SOS" : "Hold 3 seconds to activate emergency SOS"}
        tabIndex={0}
        onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') startPress(); }}
        onKeyUp={(e) => { if (e.key === 'Enter' || e.key === ' ') stopPress(); }}
        style={{ position: "relative", width: "180px", height: "180px", borderRadius: "50%", cursor: "pointer", userSelect: "none", outline: 'none' }}
      >
        {activated && showCancel && (
          <>
            <div style={{ position: "absolute", inset: "-30px", borderRadius: "50%", border: "3px solid rgba(255,71,87,0.5)", animation: "pulseRing 1s ease-out infinite" }} />
            <div style={{ position: "absolute", inset: "-50px", borderRadius: "50%", border: "2px solid rgba(255,71,87,0.3)", animation: "pulseRing 1s ease-out infinite 0.3s" }} />
          </>
        )}
        <svg className="sos-countdown-circle" style={{ position: "absolute", inset: 0 }} width="180" height="180" viewBox="0 0 180 180">
          <circle cx="90" cy="90" r="82" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="8" />
          <circle cx="90" cy="90" r="82" fill="none" stroke={showCancel ? "#FF4757" : pressing ? "#FF6B35" : "#FF4757"} strokeWidth="8" strokeDasharray={`${2 * Math.PI * 82}`} strokeDashoffset={`${2 * Math.PI * 82 * (1 - progress / 100)}`} strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.06s linear" }} />
        </svg>
        <div style={{ position: "absolute", inset: "14px", borderRadius: "50%", background: showCancel ? "linear-gradient(135deg, #FF4757, #C0392B)" : pressing ? "linear-gradient(135deg, #FF6B35, #FF4757)" : "linear-gradient(135deg, #2D2D2D, #1A1A1A)", boxShadow: showCancel ? "0 0 60px rgba(255,71,87,0.9), 0 0 120px rgba(255,71,87,0.3)" : pressing ? "0 0 30px rgba(255,107,53,0.6)" : "0 8px 32px rgba(0,0,0,0.5)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "4px", transition: "all 0.2s ease", transform: pressing ? "scale(0.97)" : "scale(1)" }}>
          <span style={{ fontSize: "36px" }} role="img" aria-label={showCancel ? "siren" : "SOS"}>{showCancel ? "🚨" : "🆘"}</span>
          <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: showCancel ? "14px" : "16px", color: showCancel ? "#FF8A8A" : "#fff", letterSpacing: "2px" }}>
            {showCancel ? `SENDING IN ${countdown}` : pressing ? "HOLD..." : "PANIC"}
          </span>
        </div>
      </div>
      {showCancel ? (
        <div style={{ display: 'flex', gap: '10px', width: '100%', maxWidth: '280px' }}>
          <button onClick={cancelSOS} style={{ flex: 1, padding: '12px', background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '12px', color: '#fff', fontSize: '13px', fontWeight: 600, cursor: 'pointer' }}>✋ CANCEL</button>
          <button onClick={confirmSOS} style={{ flex: 1, padding: '12px', background: 'linear-gradient(135deg, #FF4757, #C0392B)', border: 'none', borderRadius: '12px', color: '#fff', fontSize: '13px', fontWeight: 600, cursor: 'pointer', boxShadow: '0 4px 16px rgba(255,71,87,0.4)' }}>📡 SEND NOW</button>
        </div>
      ) : (
        <p style={{ color: "rgba(255,255,255,0.4)", fontSize: "11px", letterSpacing: "1px", fontFamily: "monospace", textAlign: "center" }}>
          {activated ? "TAP TO RESET" : "HOLD 3 SECONDS TO ALERT"}
        </p>
      )}
    </div>
  );
}

function EmergencyContacts() {
  const [contacts, setContacts] = useState(() => { try { return JSON.parse(localStorage.getItem('roadsos_emergency_contacts') || '[]'); } catch { return []; } });
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState('');
  const [newPhone, setNewPhone] = useState('');

  const saveContacts = (updated) => { localStorage.setItem('roadsos_emergency_contacts', JSON.stringify(updated)); setContacts(updated); };
  const addContact = () => {
    if (!newName.trim() || !newPhone.trim()) return;
    const updated = [...contacts, { id: Date.now(), name: newName.trim(), phone: newPhone.trim() }];
    saveContacts(updated);
    setNewName(''); setNewPhone(''); setShowAdd(false);
    showToast('Contact added', 'success');
  };
  const removeContact = (id) => { const updated = contacts.filter(c => c.id !== id); saveContacts(updated); showToast('Contact removed', 'info'); };

  return (
    <div style={{ marginBottom: '20px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
        <p style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: "14px", letterSpacing: "2px", color: "rgba(255,255,255,0.4)" }}>EMERGENCY CONTACTS</p>
        <button onClick={() => setShowAdd(!showAdd)} style={{ background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '8px', padding: '4px 10px', color: 'rgba(255,255,255,0.5)', fontSize: '12px', cursor: 'pointer' }}>{showAdd ? '✕' : '+ Add'}</button>
      </div>
      {showAdd && (
        <div style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: '12px', padding: '12px', marginBottom: '12px' }}>
          <input value={newName} onChange={(e) => setNewName(e.target.value)} placeholder="Name (e.g. Mom)" style={{ width: '100%', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '8px', padding: '8px 10px', color: '#fff', fontSize: '13px', marginBottom: '8px', outline: 'none' }} />
          <input value={newPhone} onChange={(e) => setNewPhone(e.target.value)} placeholder="Phone number" type="tel" style={{ width: '100%', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '8px', padding: '8px 10px', color: '#fff', fontSize: '13px', marginBottom: '10px', outline: 'none' }} />
          <button onClick={addContact} style={{ width: '100%', padding: '8px', background: '#2ED573', border: 'none', borderRadius: '8px', color: '#fff', fontSize: '12px', fontWeight: 600, cursor: 'pointer' }}>Save Contact</button>
        </div>
      )}
      {contacts.length === 0 ? (
        <p style={{ color: 'rgba(255,255,255,0.3)', fontSize: '12px', textAlign: 'center', padding: '16px' }}>No emergency contacts added. Add contacts to auto-alert them during SOS.</p>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
          {contacts.map(contact => (
            <div key={contact.id} style={{ display: 'flex', alignItems: 'center', gap: '10px', background: 'rgba(255,255,255,0.03)', borderRadius: '10px', padding: '10px 12px' }}>
              <span style={{ fontSize: '20px' }} role="img" aria-label="person">👤</span>
              <div style={{ flex: 1 }}>
                <div style={{ color: '#fff', fontSize: '13px', fontWeight: 500 }}>{contact.name}</div>
                <a href={`tel:${contact.phone}`} style={{ color: '#2ED573', fontSize: '12px', textDecoration: 'none' }}>{contact.phone}</a>
              </div>
              <button onClick={() => removeContact(contact.id)} style={{ background: 'none', border: 'none', color: 'rgba(255,71,87,0.6)', fontSize: '16px', cursor: 'pointer', padding: '4px' }} aria-label={`Remove ${contact.name}`}>🗑️</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

              <div style={{ display: "flex", gap: "8px", overflowX: "auto", paddingBottom: "4px" }}>
                {filters.map((f) => (
                  <button key={f} onClick={() => setFilter(f)} className="filter-btn" style={{ background: filter === f ? "#FF4757" : "rgba(255,255,255,0.06)", border: `1px solid ${filter === f ? "#FF4757" : "rgba(255,255,255,0.1)"}`, borderRadius: "20px", padding: "6px 14px", color: filter === f ? "#fff" : "rgba(255,255,255,0.5)", fontSize: "12px", fontWeight: "600", cursor: "pointer", whiteSpace: "nowrap" }}>{f}</button>
                ))}
              </div>
            </div>
            
            {servicesLoading && (
              <div style={{ textAlign: 'center', padding: '20px', color: 'rgba(255,255,255,0.4)', fontSize: '13px' }}>
                <div style={{ width: '24px', height: '24px', borderRadius: '50%', border: '2px solid rgba(255,255,255,0.1)', borderTop: '2px solid #FF4757', animation: 'spin 1s linear infinite', margin: '0 auto 10px' }} />
                Finding nearby emergency services...
              </div>
            )}
            
            {servicesError && (
              <div style={{ background: 'rgba(255,71,87,0.1)', border: '1px solid rgba(255,71,87,0.3)', borderRadius: '12px', padding: '12px', color: '#FF8A8A', fontSize: '12px', textAlign: 'center', marginBottom: '12px' }}>
                {servicesError}
              </div>
            )}

            <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
              {filtered.map((s, i) => <ServiceCard key={s.id} service={s} index={i} />)}
            </div>
            
            {filtered.length === 0 && !servicesLoading && (
              <div style={{ textAlign: 'center', padding: '30px', color: 'rgba(255,255,255,0.3)' }}>
                <p style={{ fontSize: '14px', marginBottom: '8px' }}>No services found</p>
                <p style={{ fontSize: '12px' }}>Try changing the filter or check your location permissions.</p>
              </div>
            )}
          </>
        )}

        {tab === "info" && (
          <div style={{ paddingTop: "24px" }}>
            {[
              { emoji: "🚗", title: "Road Accident", steps: ["Move to safety if possible", "Call 108 for ambulance", "Don't move injured persons", "Keep road clear for emergency vehicles"] },
              { emoji: "🔥", title: "Vehicle Fire", steps: ["Exit vehicle immediately", "Move 100m away", "Call 101 for fire rescue", "Never open hood if on fire"] },
              { emoji: "⚡", title: "Medical Emergency", steps: ["Keep person calm and still", "Call 108 immediately", "Don't give food or water", "Monitor breathing until help arrives"] },
              { emoji: "🩸", title: "Severe Bleeding", steps: ["Apply direct pressure to wound", "Elevate injured area above heart", "Call 108 for ambulance", "Do not remove embedded objects"] },
              { emoji: "💀", title: "Unconscious Person", steps: ["Check breathing and pulse", "Call 108 immediately", "Place in recovery position", "Do not give food or water"] },
            ].map((guide, i) => (
              <div key={i} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: "16px", padding: "16px", marginBottom: "12px", animation: `slideIn 0.4s ease ${i * 0.1}s both` }}>
                <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "12px" }}>
                  <span style={{ fontSize: "24px" }} role="img" aria-label={guide.title}>{guide.emoji}</span>
                  <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: "18px", letterSpacing: "1.5px" }}>{guide.title}</span>
                </div>
                {guide.steps.map((step, j) => (
                  <div key={j} style={{ display: "flex", gap: "10px", marginBottom: "8px", color: "rgba(255,255,255,0.65)", fontSize: "13px", lineHeight: "1.5" }}>
                    <span style={{ background: "#FF475722", color: "#FF4757", borderRadius: "50%", width: "20px", height: "20px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "10px", fontWeight: "700", flexShrink: 0 }}>{j + 1}</span>
                    {step}
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}
      </div>

      {showSettings && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(8px)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px', animation: 'fadeIn 0.2s ease' }} onClick={() => setShowSettings(false)}>
          <div style={{ background: '#1a1a1a', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '20px', padding: '24px', width: '100%', maxWidth: '360px', animation: 'slideIn 0.3s ease' }} onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
              <h2 style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: '20px', letterSpacing: '2px', color: '#fff' }}>⚙️ SETTINGS</h2>
              <button onClick={() => setShowSettings(false)} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,0.5)', fontSize: '20px', cursor: 'pointer' }} aria-label="Close settings">✕</button>
            </div>
            {settingsPage === 'main' && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                <div style={{ background: 'rgba(255,255,255,0.03)', borderRadius: '12px', padding: '14px' }}>
                  <div style={{ color: 'rgba(255,255,255,0.5)', fontSize: '11px', fontWeight: 600, marginBottom: '4px', letterSpacing: '1px' }}>APP VERSION</div>
                  <div style={{ color: '#fff', fontSize: '14px' }}>RoadSoS v2.1</div>
                </div>
                <div style={{ background: 'rgba(255,255,255,0.03)', borderRadius: '12px', padding: '14px' }}>
                  <div style={{ color: 'rgba(255,255,255,0.5)', fontSize: '11px', fontWeight: 600, marginBottom: '4px', letterSpacing: '1px' }}>LOCATION STATUS</div>
                  <div style={{ color: location.status === 'active' ? '#2ED573' : location.status === 'error' ? '#FF4757' : '#FF8C00', fontSize: '14px' }}>
                    {location.status === 'active' ? '✓ GPS Active' : location.status === 'error' ? '✗ ' + location.error : '⟳ Detecting...'}
                  </div>
                </div>
                <div style={{ background: 'rgba(255,255,255,0.03)', borderRadius: '12px', padding: '14px' }}>
                  <div style={{ color: 'rgba(255,255,255,0.5)', fontSize: '11px', fontWeight: 600, marginBottom: '4px', letterSpacing: '1px' }}>DATA SOURCE</div>
                  <div style={{ color: '#fff', fontSize: '14px' }}>OpenStreetMap (Free)</div>
                  <div style={{ color: 'rgba(255,255,255,0.4)', fontSize: '11px', marginTop: '4px' }}>Real nearby hospitals, police & fire stations</div>
                </div>
                <button onClick={() => setSettingsPage('danger')} style={{ background: 'rgba(255,71,87,0.1)', border: '1px solid rgba(255,71,87,0.3)', borderRadius: '12px', padding: '14px', color: '#FF8A8A', fontSize: '14px', fontWeight: 600, cursor: 'pointer', textAlign: 'left', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span>🗑️ Clear All Data</span>
                  <span style={{ color: 'rgba(255,255,255,0.3)' }}>›</span>
                </button>
              </div>
            )}
            {settingsPage === 'danger' && (
              <div>
                <p style={{ color: 'rgba(255,255,255,0.6)', fontSize: '13px', lineHeight: '1.6', marginBottom: '20px' }}>This will permanently delete your API key and all emergency contacts. This action cannot be undone.</p>
                <div style={{ display: 'flex', gap: '10px' }}>
                  <button onClick={() => setSettingsPage('main')} style={{ flex: 1, padding: '12px', background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '12px', color: '#fff', fontSize: '13px', fontWeight: 600, cursor: 'pointer' }}>✋ Cancel</button>
                                    <button onClick={() => setSettingsPage('main')} style={{ flex: 1, padding: '12px', background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '12px', color: '#fff', fontSize: '13px', fontWeight: 600, cursor: 'pointer' }}>✋ Cancel</button>
                  <button onClick={clearAllData} style={{ flex: 1, padding: '12px', background: 'linear-gradient(135deg, #FF4757, #C0392B)', border: 'none', borderRadius: '12px', color: '#fff', fontSize: '13px', fontWeight: 600, cursor: 'pointer' }}>🗑️ Confirm Delete</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: "420px", background: "linear-gradient(to top, #0D0D0D 60%, transparent)", padding: "20px 20px 24px", display: "flex", justifyContent: "space-around", alignItems: "center", zIndex: 100, borderTop: "1px solid rgba(255,255,255,0.06)" }}>
        {navItems.map((item) => (
          <button key={item.id} onClick={() => handleTabChange(item.id)} className="nav-btn" style={{ background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: "4px", cursor: "pointer", padding: "8px 12px", borderRadius: "12px", color: tab === item.id ? "#FF4757" : "rgba(255,255,255,0.4)", transition: "all 0.2s ease" }} aria-label={item.label}>
            <span style={{ fontSize: "22px", filter: tab === item.id ? "drop-shadow(0 0 8px rgba(255,71,87,0.5))" : "none" }} role="img" aria-label={item.label}>{item.icon}</span>
            <span style={{ fontSize: "10px", fontWeight: 600, letterSpacing: "0.5px" }}>{item.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<><OfflineDetector /><RoadSoS /></>);
</script>
</body>
</html>
